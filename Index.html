html <!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>LUMINA</title>  <!-- Google Fonts --> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">  <style> body {     margin: 0;     font-family: 'Poppins', sans-serif;     background-color: #ffffff;     color: #111; }  /* HEADER */ header {     display: flex;     justify-content: space-between;     padding: 20px 40px;     border-bottom: 1px solid #eee; }  header h1 {     font-family: 'Playfair Display', serif;     color: #f4c542; }  nav a {     margin-left: 20px;     text-decoration: none;     color: #333;     font-weight: 400; }  /* HERO */ .hero {     text-align: center;     padding: 80px 20px;     background-color: #fff8dc; }  .hero h2 {     font-size: 40px; }  .btn {     background-color: #f4c542;     border: none;     padding: 12px 25px;     margin-top: 20px;     cursor: pointer; }  /* PRODUCTS */ .section-title {     text-align: center;     margin-top: 50px;     font-size: 28px; }  .products {     display: grid;     grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));     gap: 20px;     padding: 40px; }  .card {     border: 1px solid #eee;     padding: 15px;     text-align: center;     transition: 0.3s; }  .card:hover {     transform: translateY(-5px); }  .card img {     width: 100%;     height: 200px;     object-fit: cover; }  /* GLASSES */ .glasses {     padding: 40px; }  .glasses-container {     display: flex;     gap: 15px;     justify-content: center; }  .glass-box {     width: 120px;     height: 120px;     border: 1px solid #eee; }  .glass-box img {     width: 100%;     height: 100%;     object-fit: cover; }  /* FOOTER */ footer {     text-align: center;     padding: 20px;     background: #fff8dc;     margin-top: 40px; } </style> </head>  <body>  <header>     <h1>LUMINA</h1>     <nav>         <a href="#">Home</a>         <a href="#">Shop</a>         <a href="#">Contact</a>     </nav> </header>  <section class="hero">     <h2>Minimal Style. Bright You.</h2>     <p>Discover your perfect outfit</p>     <button class="btn">Shop Now</button> </section>  <h2 class="section-title">Clothing</h2>  <section class="products">     <div class="card">         <img src="https://via.placeholder.com/200">         <h3>Hoodie</h3>         <p>$40</p>     </div>      <div class="card">         <img src="https://via.placeholder.com/200">         <h3>T-Shirt</h3>         <p>$25</p>     </div>      <div class="card">         <img src="https://via.placeholder.com/200">         <h3>Dress</h3>         <p>$60</p>     </div> </section>  <h2 class="section-title">Glasses</h2>  <section class="glasses">     <div class="glasses-container">         <div class="glass-box">             <img src="https://via.placeholder.com/120">         </div>         <div class="glass-box">             <img src="https://via.placeholder.com/120">         </div>         <div class="glass-box">             <img src="https://via.placeholder.com/120">         </div>     </div> </section>  <footer>     <p>© 2026 LUMINA</p> </footer>  </body> </html>
